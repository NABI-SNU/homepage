version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: cron
      cronjob: '0 9 */14 * *'
      timezone: UTC
    target-branch: main
    labels:
      - dependencies
      - security

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: cron
      cronjob: '0 9 */14 * *'
      timezone: UTC
    target-branch: main
    labels:
      - dependencies
      - security
