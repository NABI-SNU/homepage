name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AUTH_TRUSTED_ORIGINS: http://localhost:3000
  AUTH_USE_SECURE_COOKIES: 'false'
  BETTER_AUTH_SECRET: ci-better-auth-secret-0123456789
  BETTER_AUTH_URL: http://localhost:3000
  CRON_SECRET: ci-cron-secret
  HUSKY: '0'
  NEXT_PUBLIC_SERVER_URL: http://localhost:3000
  PAYLOAD_SECRET: ci-payload-secret
  PREVIEW_SECRET: ci-preview-secret
  S3_ACCESS_KEY_ID: ci-s3-access-key
  S3_BUCKET: ci-media
  S3_CLIENT_UPLOADS: 'true'
  S3_MEDIA_PREFIX: webp
  S3_REGION: auto
  S3_SECRET_ACCESS_KEY: ci-s3-secret
  S3_STORAGE_ENABLED: 'true'
  USER_APPROVAL_TOKEN_SECRET: ci-approval-token-secret

jobs:
  quality:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      STORAGE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homepage_ci_quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  generated-files:
    name: Generated Files
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    timeout-minutes: 10
    env:
      STORAGE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homepage_ci_quality

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate Import Map and Types
        run: |
          pnpm generate:importmap
          pnpm generate:types

      - name: Verify Generated Files Committed
        run: git diff --exit-code -- "src/app/(payload)/admin/importMap.js" "src/payload-types.ts"

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs:
      - quality
      - generated-files
    if: github.event_name != 'pull_request'
    timeout-minutes: 20
    env:
      STORAGE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homepage_ci_build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          run_install: false
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: NODE_ENV=production pnpm build

  docker-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name != 'pull_request' && hashFiles('Dockerfile') != ''
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker Image
        run: docker build -t homepage-ci-smoke .
