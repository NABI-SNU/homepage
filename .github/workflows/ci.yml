name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Typecheck, and Generated Files
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HUSKY: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Regenerate Import Map and Types
        run: |
          pnpm generate:importmap
          pnpm generate:types

      - name: Verify Generated Files Committed
        run: git diff --exit-code -- "src/app/(payload)/admin/importMap.js" "src/payload-types.ts"

      - name: Typecheck
        run: pnpm typecheck

  integration-and-build:
    name: Integration Tests and Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: homepage_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d homepage_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      AUTH_TRUSTED_ORIGINS: http://localhost:3000
      AUTH_USE_SECURE_COOKIES: 'false'
      BETTER_AUTH_SECRET: ci-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      CI: 'true'
      CRON_SECRET: ci-cron-secret
      HUSKY: '0'
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NODE_ENV: test
      PAYLOAD_PUSH_SCHEMA: 'true'
      PAYLOAD_SECRET: ci-payload-secret
      PREVIEW_SECRET: ci-preview-secret
      STORAGE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homepage_ci
      USER_APPROVAL_TOKEN_SECRET: ci-approval-token-secret
      VITEST: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Seed Required Test Accounts
        run: pnpm seed:test-accounts

      - name: Run Integration Tests
        run: pnpm test:int

      - name: Verify Critical DB Indexes
        run: pnpm db:check:activity-indexes

      - name: Production Build
        run: NODE_ENV=production pnpm build

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request'
    timeout-minutes: 35

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: homepage_ci_e2e
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d homepage_ci_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      AUTH_TRUSTED_ORIGINS: http://localhost:3000
      AUTH_USE_SECURE_COOKIES: 'false'
      BETTER_AUTH_SECRET: ci-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      CI: 'true'
      CRON_SECRET: ci-cron-secret
      HUSKY: '0'
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      NODE_ENV: test
      PAYLOAD_PUSH_SCHEMA: 'true'
      PAYLOAD_SECRET: ci-payload-secret
      PREVIEW_SECRET: ci-preview-secret
      STORAGE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/homepage_ci_e2e
      USER_APPROVAL_TOKEN_SECRET: ci-approval-token-secret
      VITEST: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed Required Test Accounts
        run: pnpm seed:test-accounts

      - name: Run End-to-End Tests
        run: pnpm test:e2e

      - name: Upload Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: ignore
          name: playwright-report-${{ github.run_id }}
          path: |
            playwright-report
            test-results
